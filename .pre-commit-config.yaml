repos:
  # ---------------------------------------------------------------------------
  # General file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # ---------------------------------------------------------------------------
  # Python formatting and linting (ruff)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # Static type checking (mypy --strict) — runs in the project's uv venv so
  # it sees the full dep graph (anthropic, dotenv, pyyaml, etc.) and the
  # pyproject `[tool.mypy.overrides]` for untyped libs.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: mypy
        name: mypy --strict (uv)
        entry: uv run mypy --strict
        language: system
        types: [python]
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # Secret scanning (gitleaks)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # ---------------------------------------------------------------------------
  # Conventional Commits linter (commitizen)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.27.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
